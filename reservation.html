<!--Section reservation-->  
<section class="reservation">
     <h2>Réserver votre véhicule</h2>
<fieldset>
     <form action="">
         <div class="form-group">
             <label for="nom">NOM COMPLET</label>
             <input type="text" placeholder="Votre nom" required>
         </div>

            <div class="form-group">
             <label for="email">EMAIL</label>
             <input type="email" placeholder="Votre email" required>
         </div>

            <div class="form-group">
             <label for="telephone">TELEPHONE</label>
             <input type="tel" placeholder="Votre numéro" required>
         </div>

              <div class="form-group">
               <label for="">Choisir un véhicule</label>
                   <select name="" id="">
                 <option value="">--Sélectionner--</option>
                 <option value="">TOYOTA</option>
                 <option value="">FORD</option>
                 <option value="">BMW</option>
                 <option value="">MERCEDES</option>
                 <option value="">RANGE ROVER</option>


                </select>


            </div>

                <div class="form-group">
                <label for="datededepat">DATE DE DEPART</label>
                <input type="date" required>

                </div>

                <div class="form-group">
                <label for="datederetour">DATE DE RETOUR</label>
                <input type="date" required>

                </div>
                <button type="submit" class="send">ENVOYER</button>
                <button type="reset" class="refuse">ANNULER</button>




     </form>

</fieldset>

    </section>
